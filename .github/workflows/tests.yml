name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typecheck:
    name: typecheck (pi extension)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck pi extension
        run: bun run typecheck

  bats:
    name: bats (plugins)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y bats jq

      - name: Install ast-grep
        run: npm install -g @ast-grep/cli

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Confirm tooling
        run: |
          bats --version
          jq --version
          ast-grep --version
          python3 --version
          bun --version

      - name: Enforce colocated __tests__ layout
        run: |
          set -euo pipefail
          # Every .bats suite must live in a colocated __tests__/ dir next to the
          # code it exercises. Fail the build (with the offending paths) if any
          # test file sits outside a __tests__ directory.
          stray=$(find plugins benchmarks -name "*.bats" -not -path "*/__tests__/*" || true)
          if [ -n "$stray" ]; then
            echo "Test files outside a __tests__/ dir:" >&2
            echo "$stray" >&2
            echo "Move each into a colocated __tests__/ folder." >&2
            exit 1
          fi

      - name: Run bats suite
        run: |
          set -euo pipefail
          # Run every bats suite in every plugin AND the benchmarks harness (hook
          # and skill tests live under their owning plugin; discovery is dynamic,
          # so new plugins are picked up automatically). Skill tests that wrap a
          # REST API stub curl on PATH, so they never hit real APIs.
          mapfile -d '' suites < <(find plugins benchmarks -name "*.bats" -print0)
          if [ "${#suites[@]}" -eq 0 ]; then
            echo "No bats suites found — test discovery is broken" >&2
            exit 1
          fi
          bats "${suites[@]}"

      - name: Deterministic benchmarks (hermetic)
        run: |
          set -euo pipefail
          # Regenerate + validate the deterministic retrieval benchmark. No API
          # key in CI, so token counting is the offline heuristic — fully
          # hermetic. Guards the harness against regressions; the live tier
          # (caveman/cavecrew/whole-session) is run manually, never in CI.
          bash benchmarks/run.sh --tier deterministic
          f=$(ls benchmarks/results/retrieval-deterministic-*.json | tail -1)
          bash benchmarks/run.sh --validate "$f"

      - name: Context budget guard
        run: |
          set -euo pipefail
          # Cap the harness's own injected-context footprint: word ceilings on the
          # Session Protocol + per-language docs and on every skill `description`.
          # Fails the build if any surface exceeds budget or drops a required
          # trigger phrase, so the baseline cannot silently regrow.
          bash plugins/toolu/scripts/context-budget.sh
