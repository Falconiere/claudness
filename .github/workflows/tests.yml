name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bats:
    name: bats (hooks, tooling, skills)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y bats jq

      - name: Install ast-grep
        run: npm install -g @ast-grep/cli

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Confirm tooling
        run: |
          bats --version
          jq --version
          ast-grep --version
          python3 --version
          bun --version

      - name: Run bats suite
        run: |
          set -euo pipefail
          # Run every bats suite in the repo (hooks, tooling, skills).
          # Tooling tests stub curl on PATH, so they never hit real APIs.
          find hooks tooling skills -name "*.bats" -print0 | xargs -0 bats
